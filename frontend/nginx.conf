# ============================================================
# Nginx yapılandırması - Snapvault Frontend
# Nginx burada iki iş yapar:
#  1. Statik dosyaları (index.html) sunar
#  2. API isteklerini (/api/...) backend container'ına yönlendirir (reverse proxy)
# ============================================================

server {
    # Nginx 80 portunu dinler (container içinde)
    listen 80;

    # Statik dosyaların bulunduğu klasör (Dockerfile bunları buraya koyacak)
    root /usr/share/nginx/html;
    index index.html;

    # ----- 1. NORMAL SAYFA İSTEKLERİ -----
    # "/" veya herhangi bir sayfa istenince, index.html'i ver
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- 2. API İSTEKLERİ (reverse proxy) -----
    # "/api/..." ile başlayan istekleri backend container'ına ilet
    # "backend" = docker-compose'daki servis adı (Docker iç DNS ile çözülür)
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ----- 3. YÜKLENEN FOTOĞRAFLAR -----
    # "/uploads/..." isteklerini de backend'e ilet (fotoğraflar orada)
    location /uploads/ {
        proxy_pass http://backend:3000;
    }
}
